<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="シンプルで使いやすい、緑色を基調としたモダンなタスク管理アプリ。"><title>TaskFlow - モダンタスク管理</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"></head><body><div id="app" class="container"><header><h1>TaskFlow</h1><p class="subtitle">シンプルに、スマートにタスクを管理</p></header><main><section class="input-section"><div class="input-group"><input type="text" id="taskInput" placeholder="新しいタスクを入力..." aria-label="タスク名"><button id="addBtn" class="primary-btn">追加</button></div></section><section class="list-section"><div id="emptyState" class="empty-state"><p>タスクがありません。新しいタスクを追加しましょう！</p></div><div id="loadingState" class="loading-state hidden"><p>読み込み中...</p></div><div id="errorState" class="error-state hidden"><p>エラーが発生しました。再試行してください。</p></div><ul id="taskList" class="task-list"></ul></section></main><footer><p>&copy; 2026 TaskFlow. Built with Passion.</p></footer></div><script src="script.js"></script></body></html>
